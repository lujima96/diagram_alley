<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not Found — Diagram Alley Mockup</title>
<link rel="stylesheet" href="../_shared.css">
<style>
  body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg-base); padding: var(--sp-8); }
  .not-found { width: min(440px, 100%); text-align: center; }
  .mark { display: flex; justify-content: center; margin-bottom: var(--sp-8); }
  .code { font-family: var(--font-display); font-size: 72px; font-weight: 800; letter-spacing: 0; color: var(--text-primary); line-height: 1; margin-bottom: var(--sp-4); }
  .actions { display: flex; justify-content: center; gap: var(--sp-3); margin-top: var(--sp-8); }
</style>
</head>
<body>
  <main class="not-found">
    <div class="mark">
      <div class="logo-mark" style="width:48px; height:48px; font-size:20px;">DA</div>
    </div>
    <div class="code">404</div>
    <h1 class="title2" style="margin-bottom: var(--sp-2);">Page not found</h1>
    <p class="body" style="color: var(--text-secondary); line-height: 1.6;">
      This route does not exist, or the page moved.
    </p>
    <div class="actions">
      <a href="dashboard.html" class="btn btn-primary">Go to dashboard</a>
      <a href="login.html" class="btn btn-secondary">Log in</a>
    </div>
  </main>
<div class="mockup-note">not-found · *</div>
</body>
</html>
